services:
  postgres:
    image: postgres:16
    container_name: myshop-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myshop}
      POSTGRES_USER: ${POSTGRES_USER:-myshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myshop}
    ports:
      # Локальный доступ с VPS/хоста без публикации наружу.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - myshop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myshop} -d ${POSTGRES_DB:-myshop}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: myshop-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - myshop_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  nginx:
    image: nginx:1.27-alpine
    container_name: myshop-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./staticfiles:/static:ro
      - ./media:/media:ro
    depends_on:
      web:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: myshop-app:local
    container_name: myshop-web
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: shop.settings.prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
    command: ["/bin/sh", "/app/entrypoint.sh"]
    ports:
      # Приложение доступно напрямую только с хоста; снаружи трафик идет через Nginx.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=3)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: myshop-app:local
    container_name: myshop-celery-worker
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: shop.settings.prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
    command: celery -A shop worker -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: myshop-app:local
    container_name: myshop-celery-beat
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: shop.settings.prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
    command: celery -A shop beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  myshop_pgdata:
  myshop_redisdata:

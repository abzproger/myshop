{% extends 'base.html' %}

{% block title %}Пароль восстановлен - SofaArt{% endblock %}
{% block meta_robots %}noindex, nofollow{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
                    <h1 class="h4 mt-3 mb-3">Пароль успешно изменён</h1>
                    <p class="text-muted mb-4">
                        Ваш новый пароль сохранён. Теперь вы можете войти в систему, используя его.
                    </p>
                    <a href="{% url 'users:login' %}" class="btn btn-primary">
                        Перейти ко входу
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

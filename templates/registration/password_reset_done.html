{% extends 'base.html' %}

{% block title %}Письмо отправлено - MEBELHUB{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-envelope-check text-primary" style="font-size: 3rem;"></i>
                    <h1 class="h4 mt-3 mb-3">Проверьте вашу почту</h1>
                    <p class="text-muted mb-4">
                        Если указанный email зарегистрирован в системе, на него было отправлено письмо
                        со ссылкой для восстановления пароля.
                    </p>
                    <a href="{% url 'users:login' %}" class="btn btn-primary">
                        Перейти ко входу
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
